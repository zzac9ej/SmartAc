<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAC 控制台</title>
    <meta name="description" content="智慧冷氣遠端控制與排程面板">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <h1>SmartAC</h1>
            <p>智慧冷氣控制台</p>
        </header>

        <section class="glass-panel control-panel">
            <h2>新增排程</h2>
            <form id="schedule-form">
                <div class="form-group">
                    <label>動作</label>
                    <div class="action-buttons">
                        <button type="button" class="btn action-btn active" data-action="turn_on">開冷氣</button>
                        <button type="button" class="btn action-btn" data-action="turn_off">關冷氣</button>
                    </div>
                    <input type="hidden" id="action-input" value="turn_on">
                </div>

                <div class="form-group">
                    <label for="time-type">時間設定方式</label>
                    <select id="time-type" class="glass-input">
                        <option value="minutes">多久後執行 (分鐘)</option>
                        <option value="target">指定時間 (HH:mm)</option>
                    </select>
                </div>

                <div class="form-group" id="minutes-group">
                    <label for="delay-minutes">延遲分鐘數</label>
                    <input type="number" id="delay-minutes" class="glass-input" placeholder="例如: 30" min="0">
                </div>

                <div class="form-group hidden" id="target-group">
                    <label for="target-time">指定時間</label>
                    <input type="time" id="target-time" class="glass-input">
                </div>

                <button type="submit" class="btn btn-primary submit-btn">
                    <span class="btn-text">送出排程</span>
                    <div class="loader hidden"></div>
                </button>
                <div id="form-message" class="message"></div>
            </form>
        </section>

        <section class="glass-panel schedule-list-panel">
            <h2>等待中的排程 <button id="refresh-btn" class="icon-btn" title="重新整理">🔄</button></h2>
            <div id="schedule-list" class="schedule-list">
                <!-- 排程卡片會透過 JS 動態產生在這裡 -->
                <div class="empty-state">目前沒有排程</div>
            </div>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
