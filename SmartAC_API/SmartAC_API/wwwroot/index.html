<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冷氣遙控器</title>
    <meta name="description" content="長輩友善版的智慧冷氣遙控器">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- 全螢幕載入畫面 -->
    <div id="fullscreen-loader" class="hidden">
        <div class="spinner"></div>
        <p>正在發送指令...</p>
    </div>

    <!-- 成功/失敗提示框 -->
    <div id="toast" class="toast hidden"></div>

    <main class="app-container">
        <header class="app-header">
            <h1>冷氣遙控器</h1>
        </header>

        <!-- 遙控器大按鈕區 -->
        <section class="remote-grid">
            <button class="mega-btn btn-on" data-action="turn_on" data-delay="0">
                <span class="icon">❄️</span>
                <span class="title">馬上開</span>
            </button>
            
            <button class="mega-btn btn-on-delay" data-action="turn_on" data-delay="30">
                <span class="icon">⏱️</span>
                <span class="title">30分後開</span>
            </button>

            <button class="mega-btn btn-off" data-action="turn_off" data-delay="0">
                <span class="icon">🛑</span>
                <span class="title">馬上關</span>
            </button>
            
            <button class="mega-btn btn-off-delay" data-action="turn_off" data-delay="60">
                <span class="icon">💤</span>
                <span class="title">1小時後關</span>
            </button>
        </section>

        <!-- 指定時間區 -->
        <section class="custom-time-panel glass-panel">
            <h2>⏰ 指定時間</h2>
            <div class="time-picker-row">
                <input type="time" id="custom-time" class="massive-input">
            </div>
            <div class="time-action-row">
                <button id="btn-custom-on" class="mega-btn-small btn-on-small">開冷氣</button>
                <button id="btn-custom-off" class="mega-btn-small btn-off-small">關冷氣</button>
            </div>
        </section>

        <!-- 等待中的排程清單 -->
        <section class="schedule-panel glass-panel">
            <div class="panel-header">
                <h2>📋 準備執行的動作</h2>
                <button id="refresh-btn" class="icon-btn">🔄</button>
            </div>
            <div id="schedule-list" class="schedule-list">
                <!-- 內容由 JS 動態產生 -->
            </div>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
